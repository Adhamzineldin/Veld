upstream iam_svc           { server iam-service:3001; }
upstream accounts_svc      { server account-service:3002; }
upstream transactions_svc  { server transaction-service:3003; }
upstream cards_svc         { server card-service:3004; }
upstream lending_svc       { server lending-service:3005; }
upstream notifications_svc { server notification-service:3006; }

server {
  listen 3000;

  # Each module prefix in the .veld contracts maps to a microservice here.
  # The frontend SDK hits a single baseUrl (localhost:3000); nginx routes
  # each /api/<service> prefix to the correct container.
  location /api/iam           { proxy_pass http://iam_svc;           }
  location /api/accounts      { proxy_pass http://accounts_svc;      }
  location /api/transactions  { proxy_pass http://transactions_svc;  }
  location /api/cards         { proxy_pass http://cards_svc;         }
  location /api/lending       { proxy_pass http://lending_svc;       }
  location /api/notifications { proxy_pass http://notifications_svc; }
}
