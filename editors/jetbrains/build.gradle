plugins {
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.1.10'
    id 'org.jetbrains.intellij.platform' version '2.3.0'
}

group = 'dev.veld'
version = '0.6.0'

repositories {
    mavenCentral()
    intellijPlatform {
        defaultRepositories()
    }
}

dependencies {
    intellijPlatform {
        // Target IntelliJ 2025.1 (build 251) — supports compiling against modern APIs.
        // The plugin runs on any IDE from build 241 through 263.* per since/until-build.
        intellijIdeaCommunity('2025.1')

        // JSON plugin provides com.jetbrains.jsonSchema.* (used in VeldConfigSchemaProviderFactory).
        bundledPlugin('com.intellij.modules.json')

        // Required for bytecode instrumentation (JetBrains annotations, nullability, etc.)
        instrumentationTools()
    }
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
}

intellijPlatform {
    pluginConfiguration {
        ideaVersion {
            sinceBuild = '241'
            untilBuild = '263.*'
        }
    }

    signing {
        certificateChain = providers.environmentVariable("CERTIFICATE_CHAIN")
        privateKey = providers.environmentVariable("PRIVATE_KEY")
        password = providers.environmentVariable("PRIVATE_KEY_PASSWORD")
    }

    publishing {
        token = providers.environmentVariable("JETBRAINS_PUBLISH_TOKEN")
    }
}

tasks.withType(JavaCompile).configureEach {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = '17'
    }
}
