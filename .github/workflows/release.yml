name: Release

# ─── HOW THIS WORKS ─────────────────────────────────────────────────────────
#
# Trigger:  Push a version tag →  git tag v0.2.0 && git push origin v0.2.0
#
# Pipeline: Test → Build (5 platforms) → GitHub Release → npm + pip + Homebrew
#
# Secrets needed (set in GitHub repo → Settings → Secrets → Actions):
#   GITHUB_TOKEN    — automatic, no setup needed
#   NPM_TOKEN       — from npmjs.com → Access Tokens → Automation
#   PYPI_TOKEN      — from pypi.org → Account Settings → API tokens
#
# Pre-release tags (e.g. v0.2.0-beta.1) skip npm/pip/Homebrew publishing.
# ─────────────────────────────────────────────────────────────────────────────

# Trigger: push a version tag like v0.1.0, v1.2.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.22"

jobs:
  # ─── 1. Run tests before building anything ──────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...

  # ─── 2. Build binaries for all platforms ────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          go build \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -trimpath \
            -o "veld${EXT}" \
            ./cmd/veld

          echo "✓ Built veld ${VERSION} for ${GOOS}/${GOARCH}"

      - name: Package archive
        run: |
          PLATFORM="${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCHIVE_NAME="veld-${PLATFORM}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" veld.exe
            echo "ASSET=${ARCHIVE_NAME}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" veld
            echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: veld-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          retention-days: 1

  # ─── 3. Create GitHub Release with all binaries ─────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release/
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Generate SHA256 checksums
        working-directory: release
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`${PREV_TAG}\`:" >> changelog.md
            echo "" >> changelog.md
            git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s (%h)" --no-merges >> changelog.md
          else
            echo "Initial release 🎉" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo '```bash' >> changelog.md
          echo "# npm" >> changelog.md
          echo "npm install veld" >> changelog.md
          echo "" >> changelog.md
          echo "# pip" >> changelog.md
          echo "pip install veld" >> changelog.md
          echo "" >> changelog.md
          echo "# Go" >> changelog.md
          echo "go install github.com/veld-dev/veld/cmd/veld@${VERSION}" >> changelog.md
          echo "" >> changelog.md
          echo "# Homebrew" >> changelog.md
          echo "brew install veld-dev/tap/veld" >> changelog.md
          echo "" >> changelog.md
          echo "# Composer" >> changelog.md
          echo "composer require veld-dev/veld" >> changelog.md
          echo '```' >> changelog.md
          echo "" >> changelog.md
          echo "## Checksums (SHA256)" >> changelog.md
          echo "" >> changelog.md
          echo '```' >> changelog.md
          cat release/checksums.txt >> changelog.md
          echo '```' >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Veld ${{ steps.version.outputs.VERSION }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 4. Publish npm package ─────────────────────────────────────────────────
  publish-npm:
    name: Publish npm
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-')"  # skip pre-releases
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update package version
        working-directory: packages/npm
        run: |
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: packages/npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── 5. Publish pip package ─────────────────────────────────────────────────
  publish-pip:
    name: Publish pip
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        working-directory: packages/pip
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml

      - name: Update version in __init__.py
        working-directory: packages/pip
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" veld/__init__.py

      - name: Build and publish
        working-directory: packages/pip
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ─── 6. Update Homebrew formula ─────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-')"
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets for SHA256
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BASE="https://github.com/veld-dev/veld/releases/download/v${VERSION}"
          mkdir -p /tmp/hashes

          for PLATFORM in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            curl -sL "${BASE}/veld-${PLATFORM}.tar.gz" -o "/tmp/hashes/veld-${PLATFORM}.tar.gz"
          done

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "DARWIN_AMD64=$(sha256sum /tmp/hashes/veld-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "DARWIN_ARM64=$(sha256sum /tmp/hashes/veld-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "LINUX_AMD64=$(sha256sum /tmp/hashes/veld-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "LINUX_ARM64=$(sha256sum /tmp/hashes/veld-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FORMULA="packages/homebrew/Formula/veld.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "s/PLACEHOLDER_SHA256_DARWIN_ARM64/${{ steps.hashes.outputs.DARWIN_ARM64 }}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_SHA256_DARWIN_AMD64/${{ steps.hashes.outputs.DARWIN_AMD64 }}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_SHA256_LINUX_ARM64/${{ steps.hashes.outputs.LINUX_ARM64 }}/" "$FORMULA"
          sed -i "s/PLACEHOLDER_SHA256_LINUX_AMD64/${{ steps.hashes.outputs.LINUX_AMD64 }}/" "$FORMULA"

          echo "Updated formula:"
          cat "$FORMULA"

      # If you have a separate homebrew-tap repo, push the formula there:
      # - name: Push to homebrew-tap
      #   uses: dmnemec/copy_file_to_another_repo_action@main
      #   env:
      #     API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      #   with:
      #     source_file: packages/homebrew/Formula/veld.rb
      #     destination_repo: veld-dev/homebrew-tap
      #     destination_folder: Formula
      #     user_email: ci@veld.dev
      #     user_name: veld-ci
      #     commit_message: "Update veld to v${{ steps.version.outputs.VERSION }}"

